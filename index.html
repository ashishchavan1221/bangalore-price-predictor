<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangalore Home Price Predictor</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="js/script.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="overlay"></div>
    
    <div class="main-container">
        
        <!-- Left Panel: Form Details -->
        <div class="left-panel">
            <header class="header">
                <div class="logo-circle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </div>
                <div>
                    <h1>Bangalore Real Estate</h1>
                    <p>Enter property details for an AI-powered accurate price estimate.</p>
                </div>
            </header>

            <form class="form-container" onsubmit="return false;">
                <div class="input-row">
                    <!-- Area -->
                    <div class="input-group">
                        <label for="uiSqft">Area (Square Feet)</label>
                        <input class="input-modern" type="number" id="uiSqft" name="Squareft" value="1000" min="300" max="50000" />
                    </div>
                    <!-- Location -->
                    <div class="input-group">
                        <label for="uiLocations">Search Location</label>
                        <div class="select-wrapper">
                            <select class="select-modern" name="" id="uiLocations">
                                <option value="" disabled="disabled" selected="selected">Loading...</option>
                            </select>
                            <div class="select-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>BHK (Bedrooms)</label>
                    <div class="radio-pill-group">
                        <input type="radio" id="radio-bhk-1" name="uiBHK" value="1" />
                        <label class="pill" for="radio-bhk-1">1</label>
                        <input type="radio" id="radio-bhk-2" name="uiBHK" value="2" checked />
                        <label class="pill" for="radio-bhk-2">2</label>
                        <input type="radio" id="radio-bhk-3" name="uiBHK" value="3" />
                        <label class="pill" for="radio-bhk-3">3</label>
                        <input type="radio" id="radio-bhk-4" name="uiBHK" value="4" />
                        <label class="pill" for="radio-bhk-4">4</label>
                        <input type="radio" id="radio-bhk-5" name="uiBHK" value="5" />
                        <label class="pill" for="radio-bhk-5">5</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Bathrooms</label>
                    <div class="radio-pill-group">
                        <input type="radio" id="radio-bath-1" name="uiBathrooms" value="1" />
                        <label class="pill" for="radio-bath-1">1</label>
                        <input type="radio" id="radio-bath-2" name="uiBathrooms" value="2" checked />
                        <label class="pill" for="radio-bath-2">2</label>
                        <input type="radio" id="radio-bath-3" name="uiBathrooms" value="3" />
                        <label class="pill" for="radio-bath-3">3</label>
                        <input type="radio" id="radio-bath-4" name="uiBathrooms" value="4" />
                        <label class="pill" for="radio-bath-4">4</label>
                        <input type="radio" id="radio-bath-5" name="uiBathrooms" value="5" />
                        <label class="pill" for="radio-bath-5">5</label>
                    </div>
                </div>

                <button class="btn-primary" onclick="onClickedEstimatePrice()" type="button">
                    <span>Calculate Estimate</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Right Panel: Result display -->
        <div class="right-panel">
            <div class="result-content-wrapper">
                <div class="result-icon-bg">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                </div>
                <h3 class="result-title">Estimated Market Price</h3>
                <p class="result-subtitle">Based on real-time data analysis of Bangalore properties.</p>
                
                <div class="result-box">
                    <div id="uiEstimatedPrice" class="price-value">
                        <!-- JS injects the h2 element here -->
                        <span class="placeholder-text">Awaiting calculation...</span>
                    </div>
                </div>
            </div>
            
            <div class="decorative-blob blob-1"></div>
            <div class="decorative-blob blob-2"></div>
        </div>

    </div>
</body>
</html>
